<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../shared.css">
  <style>
    /* Slide 1: foto grande a la izquierda, dos pequeñas apiladas a la derecha */
    .page {
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1fr 1fr;
      grid-template-areas:
        "a b"
        "a c";
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="assets/1.jpg" style="grid-area: a; object-position: 50% 40%">
    <img src="assets/2.jpg" style="grid-area: b; object-position: 50% 20%">
    <img src="assets/3.jpg" style="grid-area: c; object-position: 50% 60%">
  </div>
</body>
</html>
