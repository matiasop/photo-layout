<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../shared.css">
  <style>
    /* Slide 5: columna izquierda dominante (full height) + 3 tiras desiguales a la derecha */
    .page {
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 1fr 2fr 1fr;
      grid-template-areas:
        "a b"
        "a c"
        "a d";
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="assets/2.jpg" style="grid-area: a; object-position: 40% 50%">
    <img src="assets/3.jpg" style="grid-area: b; object-position: 50% 30%">
    <img src="assets/6.jpg" style="grid-area: c; object-position: 50% 50%">
    <img src="assets/4.jpg" style="grid-area: d; object-position: 50% 70%">
  </div>
</body>
</html>
