<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../shared.css">
  <style>
    /* Slide 3: grilla 3x3 con foto central grande */
    .page {
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: 1fr 2fr 1fr;
      grid-template-areas:
        "a b c"
        "d e f"
        "g e h";
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="assets/1.jpg" style="grid-area: a; object-position: 50% 80%">
    <img src="assets/2.jpg" style="grid-area: b; object-position: 50% 20%">
    <img src="assets/3.jpg" style="grid-area: c; object-position: 50% 40%">
    <img src="assets/4.jpg" style="grid-area: d; object-position: 50% 60%">
    <img src="assets/5.jpg" style="grid-area: e; object-position: 50% 50%">
    <img src="assets/6.jpg" style="grid-area: f; object-position: 50% 30%">
    <img src="assets/2.jpg" style="grid-area: g; object-position: 50% 70%">
    <img src="assets/3.jpg" style="grid-area: h; object-position: 50% 50%">
  </div>
</body>
</html>
